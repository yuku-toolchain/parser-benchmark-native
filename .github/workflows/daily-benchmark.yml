name: Daily Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main

jobs:
  benchmark:
    runs-on: namespace-profile-big-apple

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.2682+02142a54d

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Install Hyperfine
        run: brew install hyperfine

      - name: Update Zig dependencies (Yuku)
        run: |
          cd zig
          zig fetch --save git+https://github.com/yuku-toolchain/yuku/#HEAD

      - name: Update Rust dependencies
        run: |
          cd rust
          cargo update

      - name: Install Bun dependencies
        run: bun install

      - name: Isolate CPU
        run: |
          # Set CPU frequency governor to performance to prevent throttling
          echo performance | sudo tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor 2>/dev/null || true
          # Disable turbo boost for consistent clock speeds
          echo 1 | sudo tee /sys/devices/system/cpu/intel_pstate/no_turbo 2>/dev/null || true
          # Stop non-essential services that could cause interference
          sudo systemctl stop cron unattended-upgrades irqbalance 2>/dev/null || true

      - name: Run benchmarks
        run: |
          # Pin benchmark process to CPU core 0 with highest priority
          sudo nice -n -20 taskset -c 0 bun bench

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update daily benchmark results"
            git push
          fi
